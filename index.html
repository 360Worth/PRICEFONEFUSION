<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fone Fusion | Premium Dashboard</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
  :root {
    --accent: #ff7b00;
    --accent-glow: rgba(255, 123, 0, 0.3);
    --bg: #05070a;
    --card-bg: #11141b;
    --text-main: #ffffff;
    --text-dim: #94a3b8;
    --border: #262c3a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg);
    background-image: 
      radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 50%),
      radial-gradient(circle at 0% 100%, #0f172a 0%, transparent 40%);
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  /* Main Container */
  .container {
    width: 100%;
    max-width: 400px;
    padding: 20px;
    perspective: 1000px;
  }

  .main-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 32px;
    padding: 40px 30px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    position: relative;
    overflow: hidden;
    animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header Section */
  .header {
    text-align: center;
    margin-bottom: 35px;
  }

  .brand-badge {
    display: inline-block;
    padding: 6px 12px;
    background: rgba(255, 123, 0, 0.1);
    color: var(--accent);
    border-radius: 100px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 28px;
    margin: 0;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  /* Input Design */
  .input-wrapper {
    position: relative;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    background: #1a1f29;
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    color: white;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
    transform: scale(1.02);
  }

  /* Action Buttons */
  .actions {
    display: grid;
    gap: 12px;
  }

  .btn {
    cursor: pointer;
    border: none;
    border-radius: 16px;
    font-weight: 700;
    font-size: 15px;
    padding: 16px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 10px 25px -5px rgba(255, 123, 0, 0.4);
  }

  .btn-primary:active { transform: scale(0.96); }

  .btn-scan {
    background: #262c3a;
    color: var(--text-dim);
  }

  .btn-scan:hover { color: #fff; background: #31394a; }

  /* Scanner Preview */
  #reader {
    margin-top: 20px;
    border-radius: 20px;
    overflow: hidden;
    border: 2px dashed var(--border);
  }

  /* Result Display */
  .display-price {
    margin-top: 35px;
    padding-top: 30px;
    border-top: 1px solid var(--border);
    text-align: center;
    min-height: 100px;
  }

  .price-label {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: none;
  }

    font-size

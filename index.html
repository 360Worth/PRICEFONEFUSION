<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fone Fusion</title>

<!-- QR LIBRARY -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  text-align:center;
  width:300px;
}

.logo {
  width:80px;
}

h1 {
  color:orange;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:orange;
  border:none;
  border-radius:8px;
}

.result {
  margin-top:15px;
  font-size:22px;
  color:lightgreen;
}

#reader {
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>FONE FUSION</h1>

<input id="code" placeholder="Enter Code">

<button onclick="calculatePrice()">Check Price</button>
<button onclick="startScanner()">Scan QR</button>

<div id="reader"></div>

<div class="result" id="result"></div>

</div>

<script>

// PRICE LOGIC
function calculatePrice() {
  let input = document.getElementById("code").value.toUpperCase();

  let map = {
    F:"1",U:"2",S:"3",I:"4",
    O:"5",N:"6",T:"7",E:"8",
    C:"9",H:"0"
  };

  let result = "";

  for (let i = 0; i < input.length; i++) {
    if (map[input[i]]) {
      result += map[input[i]];
    }
  }

  if(result){
    document.getElementById("result").innerText = "₹ " + result;
  } else {
    document.getElementById("result").innerText = "Invalid Code";
  }
}

// QR SCANNER
function startScanner(){
  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 200 },
    (decodedText) => {
      document.getElementById("code").value = decodedText;
      calculatePrice();
      qr.stop();
    }
  );
}

// ENTER PRESS
document.getElementById("code").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    calculatePrice();
  }
});

</script>

</body>
</html>

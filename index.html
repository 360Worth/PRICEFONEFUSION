<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fone Fusion Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #ff8c00;
            --bg: #0a0c10;
            --card: #161b22;
            --border: #30363d;
            --text-secondary: #8b949e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 380px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-box {
            background: #0d1117;
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            width: 100%;
            color: white;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
            transition: 0.3s;
        }

        .input-box:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.2);
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        .btn {
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-main { background: var(--accent); color: #000; }
        .btn-main:hover { transform: translateY(-2px); opacity: 0.9; }

        .btn-outline { 
            background: transparent; 
            border: 1px solid var(--border); 
            color: white; 
        }

        /* QR Scanner Preview Adjustments */
        #reader {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            margin-top: 15px;
            background: #000;
        }

        .result-area {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .price-label { font-size: 12px; color: var(--text-secondary); letter-spacing: 1px; }
        .price-value { 
            font-size: 36px; 
            font-weight: 800; 
            margin-top: 5px;
            min-height: 45px;
        }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>FONE FUSION</h1>
        <p>Advanced Price Decoder</p>
    </div>

    <input type="text" id="code" class="input-box" placeholder="Enter Code (e.g. FUSO)" autocomplete="off">

    <div class="btn-group">
        <button class="btn btn-main" onclick="calculatePrice()">Decode Price</button>
        <button class="btn btn-outline" onclick="initScanner()">
            <span>📷</span> Scan QR
        </button>
    </div>

    <div id="reader"></div>

    <div class="result-area">
        <div class="price-label">ESTIMATED VALUE</div>
        <div id="priceResult" class="price-value">--</div>
    </div>
</div>

<script>
    const map = { F:"1", U:"2", S:"3", I:"4", O:"5", N:"6", T:"7", E:"8", C:"9", H:"0" };
    let html5QrCode = null;

    function calculatePrice() {
        const input = document.getElementById("code").value.toUpperCase();
        const display = document.getElementById("priceResult");
        let decoded = "";

        for (let char of input) {
            if (map[char]) decoded += map[char];
        }

        if (decoded) {
            // Animating the number display
            display.style.color = "#4ade80";
            display.innerText = "₹" + Number(decoded).toLocaleString('en-IN');
        } else {
            display.style.color = "#f87171";
            display.innerText = "Invalid";
        }
    }

    async function initScanner() {
        // If scanner is already running, stop it first
        if (html5QrCode) {
            await html5QrCode.stop();
            html5QrCode = null;
            document.getElementById("reader").innerHTML = "";
            return;
        }

        html5QrCode = new Html5Qrcode("reader");
        
        const config = { 
            fps: 10, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0 
        };

        try {
            await html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                (decodedText) => {
                    document.getElementById("code").value = decodedText;
                    calculatePrice();
                    html5QrCode.stop().then(() => { html5QrCode = null; });
                }
            );
        } catch (err) {
            alert("Camera Error: " + err + ". Ensure you are on HTTPS.");
            html5QrCode = null;
        }
    }

    // Auto-calculate on typing
    document.getElementById("code").addEventListener("input", calculatePrice);
</script>

</body>
</html>

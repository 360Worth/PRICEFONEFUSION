<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fone Fusion</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Glass Card */
.card {
  background: rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
  backdrop-filter: blur(15px);
  box-shadow: 0 0 30px rgba(255,165,0,0.2);
  text-align:center;
  width:300px;
}

/* Logo */
.logo {
  width:80px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-8px);}
  100% { transform: translateY(0px);}
}

/* Brand */
h1 {
  color:#facc15;
  margin:10px 0;
}

.tag {
  color:#94a3b8;
  font-size:13px;
  margin-bottom:20px;
}

/* Input */
input {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  font-size:16px;
  text-transform: uppercase;
}

/* Button */
button {
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#facc15;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  background:#eab308;
  box-shadow:0 0 10px #facc15;
}

/* Result */
.result {
  margin-top:20px;
  font-size:24px;
  color:#22c55e;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

  <img src="logo.png" class="logo">

  <h1>FONE FUSION</h1>
  <div class="tag">Mobile • Accessories • Covers</div>

  <input id="code" placeholder="Enter Code">
  <button onclick="calculatePrice()">Check Price</button>

  <div class="result" id="result"></div>

</div>

<script>
function calculatePrice() {
  let input = document.getElementById("code").value.toUpperCase();

  let map = {
    F: "1", U: "2", S: "3", I: "4",
    O: "5", N: "6", T: "7", E: "8",
    C: "9", H: "0"
  };

  let result = "";

  for (let i = 0; i < input.length; i++) {
    if (map[input[i]]) {
      result += map[input[i]];
    }
  }

  if(result.length > 0){
    document.getElementById("result").innerText = "₹ " + result;
  } else {
    document.getElementById("result").innerText = "Invalid Code";
  }
}

/* ENTER PRESS SEARCH */
document.getElementById("code").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    calculatePrice();
  }
});
</script>

</body>
</html>

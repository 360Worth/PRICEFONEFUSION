<script>
function calculatePrice() {
  let input = document.getElementById("code").value.toUpperCase();

  let map = {
    F: "1", U: "2", S: "3", I: "4",
    O: "5", N: "6", T: "7", E: "8",
    C: "9", H: "0"
  };

  let result = "";

  for (let i = 0; i < input.length; i++) {
    if (map[input[i]]) {
      result += map[input[i]];
    }
  }

  if(result.length > 0){
    document.getElementById("result").innerText = "Price: ₹" + result;
  } else {
    document.getElementById("result").innerText = "Invalid Code";
  }
}
</script>

<input id="code" placeholder="Enter Code (FUSION)">
<button onclick="calculatePrice()">Check Price</button>
<h2 id="result"></h2>
